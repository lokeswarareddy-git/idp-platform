services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: dev
      LOG_LEVEL: DEBUG
      JSON_LOGS: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    restart: unless-stopped
